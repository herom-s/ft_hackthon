name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          output="ft_hackthon-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          CGO_ENABLED=0 go build -o "$output" ./cmd/ft_hackthon
          echo "BINARY=$output" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ft_hackthon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ft_hackthon-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Generate release notes
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$prev" ]; then
            echo "## What's Changed" > notes.md
            git log "$prev"..HEAD --oneline --no-decorate >> notes.md
            echo "" >> notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...${{ github.ref_name }}" >> notes.md
          else
            echo "## Initial Release" > notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: notes.md
          files: release/*
          generate_release_notes: false

  deploy:
    name: Deploy to VM
    needs: [release]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'herom-s'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/ft_hackthon
            git pull origin main
            git log --oneline -3
            docker compose down --remove-orphans
            docker compose up -d --build
