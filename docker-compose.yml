services:
  testsuites:
    build:
      context: testsuites
      dockerfile: Dockerfile
    container_name: ft-hackthon-testsuites
    volumes:
      - testsuites-data:/data
    command: sh -c "cp -r /var/ft_hackthon/testsuites/. /data/."

  gitea:
    image: gitea/gitea:latest
    container_name: ft-hackthon-gitea
    environment:
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__ROOT_URL=${GITEA_PUBLIC_URL:-http://localhost:3000}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
    volumes:
      - gitea-data:/data
    ports:
      - "3000:3000"
    networks:
      - ft-hackthon-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  gitea-setup:
    image: gitea/gitea:latest
    container_name: ft-hackthon-gitea-setup
    entrypoint: []
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-ft_hackthon}
      - GITEA_ADMIN_PASSWORD=${GITEA_ADMIN_PASSWORD:-changeme123}
      - GITEA_ORG=${GITEA_ORG:-ft_hackthon}
    volumes:
      - gitea-data:/data
      - gitea-token:/token
    networks:
      - ft-hackthon-network
    command: >
      sh -c '
        apk add --no-cache curl jq su-exec >/dev/null 2>&1 &&
        echo "Creating admin user..." &&
        su-exec git gitea admin user create \
          --username "$$GITEA_ADMIN_USER" \
          --password "$$GITEA_ADMIN_PASSWORD" \
          --email "admin@ft-hackthon.local" \
          --admin 2>&1 || true &&
        echo "Waiting for Gitea API..." &&
        for i in $$(seq 1 30); do
          if curl -s http://gitea:3000/api/v1/version >/dev/null 2>&1; then
            echo "Gitea API ready" && break
          fi
          sleep 2
        done &&
        echo "Deleting old token (if any)..." &&
        curl -s -X DELETE "http://gitea:3000/api/v1/users/$$GITEA_ADMIN_USER/tokens/ft-hackthon-admin" \
          -u "$$GITEA_ADMIN_USER:$$GITEA_ADMIN_PASSWORD" >/dev/null 2>&1 || true &&
        echo "Creating access token..." &&
        TOKEN_RESP=$$(curl -s -X POST "http://gitea:3000/api/v1/users/$$GITEA_ADMIN_USER/tokens" \
          -u "$$GITEA_ADMIN_USER:$$GITEA_ADMIN_PASSWORD" \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"ft-hackthon-admin\",\"scopes\":[\"write:admin\",\"write:organization\",\"write:repository\",\"write:user\"]}") &&
        echo "$$TOKEN_RESP" | jq -r ".sha1" > /token/admin-token.txt &&
        echo "Token saved: $$(cat /token/admin-token.txt)" &&
        echo "Creating organization $$GITEA_ORG..." &&
        curl -s -X POST "http://gitea:3000/api/v1/orgs" \
          -H "Authorization: token $$(cat /token/admin-token.txt)" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"$$GITEA_ORG\",\"full_name\":\"ft_hackthon Hackathon\"}" \
          >/dev/null && echo "Organization created." || echo "Org may already exist." &&
        echo "Setup complete!"
      '

  postgres:
    image: postgres:17-alpine
    container_name: ft-hackthon-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ft_hackthon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ft_hackthon}
      - POSTGRES_DB=${POSTGRES_DB:-ft_hackthon}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ft-hackthon-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-ft_hackthon}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: ft-hackthon-api
    depends_on:
      testsuites:
        condition: service_completed_successfully
      gitea-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - API_PORT=8000
      - DATABASE_URL=postgres://${POSTGRES_USER:-ft_hackthon}:${POSTGRES_PASSWORD:-ft_hackthon}@postgres:5432/${POSTGRES_DB:-ft_hackthon}?sslmode=disable
      - TESTSUITES_PATH=/var/ft_hackthon/testsuites
      - GITEA_URL=http://gitea:3000
      - GITEA_PUBLIC_URL=${GITEA_PUBLIC_URL:-http://localhost:3000}
      - GITEA_ORG=${GITEA_ORG:-ft_hackthon}
    volumes:
      - testsuites-data:/var/ft_hackthon/testsuites:ro
      - gitea-token:/token:ro
    command: /app/ft_hackthon-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    networks:
      - ft-hackthon-network

  nginx:
    image: nginx:alpine
    container_name: ft-hackthon-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8000}:8000"
      - "${NGINX_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx-certs:/etc/nginx/certs
    entrypoint: /bin/sh
    command: /entrypoint.sh
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ft-hackthon-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ft-hackthon-worker
    depends_on:
      api:
        condition: service_healthy
    environment:
      - WORKER_ID=${WORKER_ID:-worker-1}
      - API_URL=http://api:8000
      - DATABASE_URL=postgres://${POSTGRES_USER:-ft_hackthon}:${POSTGRES_PASSWORD:-ft_hackthon}@postgres:5432/${POSTGRES_DB:-ft_hackthon}?sslmode=disable
      - TESTSUITES_PATH=/var/ft_hackthon/testsuites
      - GITEA_URL=http://gitea:3000
      - GITEA_ORG=${GITEA_ORG:-ft_hackthon}
    volumes:
      - testsuites-data:/var/ft_hackthon/testsuites:ro
      - gitea-token:/token:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: /app/ft_hackthon-worker
    networks:
      - ft-hackthon-network

  backup:
    image: postgres:17-alpine
    container_name: ft-hackthon-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-ft_hackthon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ft_hackthon}
      - POSTGRES_DB=${POSTGRES_DB:-ft_hackthon}
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - postgres-backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/restore.sh:/usr/local/bin/restore.sh:ro
    command: >
      sh -c '
        apk add --no-cache postgresql-client >/dev/null 2>&1 &&
        echo "Backup service ready. Running backup every ${BACKUP_INTERVAL:-24h}..." &&
        while true; do
          sleep ${BACKUP_INTERVAL:-86400} &&
          backup.sh
        done
      '
    networks:
      - ft-hackthon-network

networks:
  ft-hackthon-network:
    driver: bridge

volumes:
  testsuites-data:
  gitea-data:
  gitea-token:
  postgres-data:
  postgres-backups:
  nginx-certs:
